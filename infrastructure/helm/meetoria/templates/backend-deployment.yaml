apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meetoria.fullname" . }}-backend
  labels:
    app: meetoria-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: meetoria-backend
  template:
    metadata:
      labels:
        app: meetoria-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8081
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meetoria-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: meetoria-secrets
                  key: rabbitmq-url
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "meetoria.fullname" . }}-backend
spec:
  selector:
    app: meetoria-backend
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8081
